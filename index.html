<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Message 💌</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    padding: 20px;
  }

  /* Soft background glow */
  body::before {
    content: '';
    position: fixed;
    top: -150px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,80,120,0.15), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; right: -150px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(130,60,200,0.12), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Card */
  .card {
    background: #22223b;
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: clamp(30px, 6vw, 56px);
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: popUp 0.5s ease both;
  }
  @keyframes popUp {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Big emoji */
  .big-emoji {
    font-size: clamp(60px, 14vw, 90px);
    display: block;
    margin-bottom: 20px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  /* Title */
  h1 {
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 900;
    color: #ffffff;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  h1 span { color: #ff4f7a; }

  /* Small text */
  .msg {
    font-size: clamp(0.9rem, 2.5vw, 1.05rem);
    color: #a0a0c0;
    line-height: 1.7;
    margin-bottom: 34px;
  }

  /* Buttons */
  .buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .btn-yes {
    background: #ff4f7a;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    font-weight: 700;
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    width: 100%;
    max-width: 280px;
    box-shadow: 0 6px 24px rgba(255,79,122,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 6px 24px rgba(255,79,122,0.35); }
    50%       { box-shadow: 0 6px 36px rgba(255,79,122,0.6); }
  }
  .btn-yes:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 32px rgba(255,79,122,0.5);
  }

  .btn-no {
    background: transparent;
    color: #666680;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.85rem, 2.2vw, 0.95rem);
    font-weight: 700;
    padding: 10px 28px;
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-no:hover { border-color: rgba(255,255,255,0.18); color: #999; }

  /* Floating no button */
  .btn-no.floating {
    position: fixed;
    z-index: 999;
    transition:
      left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
      top  0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Funny message under buttons */
  .funny {
    margin-top: 18px;
    font-size: clamp(0.8rem, 2vw, 0.88rem);
    color: #ff4f7a;
    font-style: italic;
    min-height: 22px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .funny.show { opacity: 1; }

  /* Try count */
  .tries {
    margin-top: 10px;
    font-size: 0.8rem;
    color: #444460;
    font-weight: 700;
  }

  /* Final screen */
  #finalScreen { display: none; }
  .final-inner {
    animation: popUp 0.5s ease both;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .final-inner h2 {
    font-size: clamp(1.4rem, 4.5vw, 1.9rem);
    font-weight: 900;
    color: #fff;
  }
  .final-inner p {
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    color: #a0a0c0;
    line-height: 1.7;
  }
  .final-tag {
    font-size: 0.82rem;
    color: #444460;
    font-style: italic;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- Main Screen -->
  <div id="mainScreen">
    <span class="big-emoji" id="emoji">🙅‍♀️</span>
    <h1>I am <span>not</span> interested in you.</h1>
    <p class="msg">
      Please stop. I do not want to be your girlfriend.<br>
      This is my final answer. 😊
    </p>

    <div class="buttons" id="btnArea">
      <button class="btn-yes" onclick="handleYes()">Okay, I will leave you alone 👍</button>
      <button class="btn-no" id="noBtn" onclick="handleNo()">But I really like you 🥺</button>
    </div>

    <p class="funny" id="funnyMsg"></p>
    <p class="tries" id="triesMsg"></p>
  </div>

  <!-- Final Screen -->
  <div id="finalScreen">
    <div class="final-inner">
      <span style="font-size:clamp(60px,14vw,90px)">🎉</span>
      <h2>Thank you! Finally!</h2>
      <p>
        Good luck out there.<br>
        You will find someone who likes you back. 🌸
      </p>
      <span class="final-tag">— Not your person 😊</span>
    </div>
  </div>

</div>

<script>
  let count = 0;
  let isFloating = false;

  const noBtn    = document.getElementById('noBtn');
  const funny    = document.getElementById('funnyMsg');
  const tries    = document.getElementById('triesMsg');
  const emoji    = document.getElementById('emoji');

  const messages = [
    "No. Still no. 😄",
    "The answer is still no. 🙂",
    "This button is not going to help you. 😂",
    "Why do you keep trying? 😭",
    "Bro... please stop. 💀",
    "Okay now I am laughing. 😂",
    "You are so funny. But still no.",
    "Have you tried moving on? It works! 😊",
    "My answer is no. It will always be no.",
    "Please go drink some water and calm down. 💧",
    "The no button feels bad for you too. 😂",
    "Okay I really admire your effort. But still — no.",
    "Go touch some grass. Seriously. 🌿",
    "This is not a movie. There is no happy ending here. 😅",
    "Still here? Okay. Still no.",
  ];

  const noLabels = [
    "But I really like you 🥺",
    "Please! 🙏",
    "Just one chance? 😢",
    "Why not?? 😭",
    "I give up... 😔",
    "Fine 💔",
    "Okay... 😶",
  ];

  const emojis = [
    "🙅‍♀️", "😤", "🚫", "✋", "😑", "💨", "🚪"
  ];

  function handleNo() {
    count++;

    // Show funny message
    funny.classList.remove('show');
    setTimeout(() => {
      funny.textContent = messages[Math.min(count - 1, messages.length - 1)];
      funny.classList.add('show');
    }, 100);

    // Show try count
    tries.textContent = count > 1 ? `You have tried ${count} times. 👀` : '';

    // Change button label
    noBtn.textContent = noLabels[Math.min(count - 1, noLabels.length - 1)];

    // Change emoji
    emoji.textContent = emojis[Math.min(count - 1, emojis.length - 1)];

    // Float the button away
    if (!isFloating) {
      noBtn.classList.add('floating');
      document.body.appendChild(noBtn);
      isFloating = true;
    }
    jumpAway();
  }

  function jumpAway() {
    const w = noBtn.offsetWidth  + 20;
    const h = noBtn.offsetHeight + 20;
    const x = Math.random() * (window.innerWidth  - w) + 10;
    const y = Math.random() * (window.innerHeight - h) + 10;
    noBtn.style.left = x + 'px';
    noBtn.style.top  = y + 'px';
  }

  // Escape before hover on desktop
  noBtn.addEventListener('mouseenter', () => {
    if (isFloating) jumpAway();
  });

  // Escape before touch on mobile
  noBtn.addEventListener('touchstart', (e) => {
    if (isFloating) {
      e.preventDefault();
      jumpAway();
    }
  }, { passive: false });

  function handleYes() {
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('finalScreen').style.display = 'block';
    if (noBtn.parentNode) noBtn.parentNode.removeChild(noBtn);
  }
</script>
</body>
</html>
